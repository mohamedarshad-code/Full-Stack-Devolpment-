<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Gradient Hero Section</title>
    
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="./dist/output.css" rel="stylesheet">
</head>

<body class="mesh-bg min-h-screen flex flex-col relative">

    <!-- Navigation -->
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto w-full relative z-20">
        <div class="text-2xl font-bold tracking-tighter">NexGen<span class="text-orange-500">.</span></div>
        <div class="hidden md:flex gap-8 font-medium text-white/80">
            <a href="#" class="hover:text-white transition-colors">Features</a>
            <a href="#" class="hover:text-white transition-colors">Use Cases</a>
            <a href="#" class="hover:text-white transition-colors">Pricing</a>
            <a href="#" class="hover:text-white transition-colors">Company</a>
        </div>
        <div>
            <a href="#"
                class="hidden md:inline-block mr-4 font-medium hover:text-orange-400 transition-colors">Login</a>
            <a href="#"
                class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 px-6 py-2.5 rounded-full font-semibold transition-all">Get
                Started</a>
        </div>
    </nav>

    <!-- Hero Content -->
    <main class="flex-1 flex flex-col justify-center items-center text-center px-4 relative z-20 -mt-10">
        <div class="inline-block px-4 py-1.5 rounded-full border border-white/20 bg-white/5 backdrop-blur-md mb-8">
            <span class="text-xs font-bold uppercase tracking-wider text-orange-400 mr-2">New Release</span>
            <span class="text-sm">Tailwind CSS v4 is now supported &rarr;</span>
        </div>

        <h1 class="text-5xl md:text-7xl font-bold tracking-tight max-w-4xl leading-tight mb-6">
            Build beautiful web apps <br />
            <span class="text-gradient">faster than ever.</span>
        </h1>

        <p class="text-lg md:text-xl text-white/60 max-w-2xl mb-10 leading-relaxed">
            Combine the rapid utility-first workflow of Tailwind CSS with the power of custom HTML and CSS to create
            stunning, interactive user experiences.
        </p>

        <div class="flex flex-col sm:flex-row gap-4">
            <button
                class="bg-white text-black px-8 py-4 rounded-full font-bold text-lg hover:bg-gray-200 transition-all hover:scale-105 shadow-[0_0_30px_rgba(255,255,255,0.3)]">
                Start Building Free
            </button>
            <button
                class="px-8 py-4 rounded-full font-bold text-lg border border-white/20 hover:bg-white/10 transition-all backdrop-blur-md flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z">
                    </path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Watch Demo
            </button>
        </div>
    </main>

    <!-- Bottom SVG Shape -->
    <div class="custom-shape-divider-bottom z-10">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path
                d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z"
                class="shape-fill"></path>
        </svg>
    </div>

</body>

</html>
