<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytics Widget</title>
    
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="./dist/output.css" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center p-6 text-gray-800">

    <div class="bg-white rounded-3xl p-8 max-w-lg w-full widget-shadow border border-gray-100 relative overflow-hidden">

        <!-- Top pattern -->
        <div class="absolute top-0 right-0 p-4 opacity-5">
            <svg width="100" height="100" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z" />
            </svg>
        </div>

        <div class="flex justify-between items-center mb-8 relative z-10">
            <div>
                <h2 class="text-2xl font-bold text-gray-900">Revenue</h2>
                <p class="text-sm text-gray-500 font-medium">Last 7 days performance</p>
            </div>
            <button class="p-2 bg-gray-50 hover:bg-gray-100 rounded-full transition-colors">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z">
                    </path>
                </svg>
            </button>
        </div>

        <div class="flex items-baseline gap-3 mb-8 relative z-10">
            <span class="text-5xl font-bold tracking-tight text-gray-900">$24,592</span>
            <span class="flex items-center text-sm font-semibold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-md">
                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18">
                    </path>
                </svg>
                +12.5%
            </span>
        </div>

        <!-- Chart -->
        <div class="h-48 flex items-end justify-between gap-2 mb-6 border-b border-gray-100 pb-2 relative z-10">
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer">
                <div class="bar-animate w-full bg-indigo-100 group-hover:bg-indigo-200 rounded-t-lg transition-colors"
                    style="height: 40%"></div>
                <span class="text-xs text-gray-400 mt-2 font-medium">Mon</span>
            </div>
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer">
                <div class="bar-animate w-full bg-indigo-100 group-hover:bg-indigo-200 rounded-t-lg transition-colors"
                    style="height: 60%; animation-delay: 0.1s;"></div>
                <span class="text-xs text-gray-400 mt-2 font-medium">Tue</span>
            </div>
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer">
                <div class="bar-animate w-full bg-indigo-100 group-hover:bg-indigo-200 rounded-t-lg transition-colors"
                    style="height: 35%; animation-delay: 0.2s;"></div>
                <span class="text-xs text-gray-400 mt-2 font-medium">Wed</span>
            </div>
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer relative">
                <!-- Highlighted bar -->
                <div
                    class="absolute -top-10 opacity-0 group-hover:opacity-100 transition-opacity bg-gray-900 text-white text-xs font-bold py-1 px-2 rounded shadow-lg">
                    $5,240</div>
                <div class="bar-animate w-full bg-indigo-500 shadow-[0_0_15px_rgba(99,102,241,0.4)] rounded-t-lg"
                    style="height: 85%; animation-delay: 0.3s;"></div>
                <span class="text-xs text-indigo-600 font-bold mt-2">Thu</span>
            </div>
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer">
                <div class="bar-animate w-full bg-indigo-100 group-hover:bg-indigo-200 rounded-t-lg transition-colors"
                    style="height: 50%; animation-delay: 0.4s;"></div>
                <span class="text-xs text-gray-400 mt-2 font-medium">Fri</span>
            </div>
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer">
                <div class="bar-animate w-full bg-indigo-100 group-hover:bg-indigo-200 rounded-t-lg transition-colors"
                    style="height: 25%; animation-delay: 0.5s;"></div>
                <span class="text-xs text-gray-400 mt-2 font-medium">Sat</span>
            </div>
            <div class="w-full flex flex-col justify-end items-center group cursor-pointer">
                <div class="bar-animate w-full bg-indigo-100 group-hover:bg-indigo-200 rounded-t-lg transition-colors"
                    style="height: 45%; animation-delay: 0.6s;"></div>
                <span class="text-xs text-gray-400 mt-2 font-medium">Sun</span>
            </div>
        </div>

        <button
            class="w-full py-3 bg-white border border-gray-200 hover:border-indigo-300 hover:text-indigo-600 rounded-xl text-gray-700 font-semibold transition-all shadow-sm flex justify-center items-center relative z-10">
            View Full Report
        </button>
    </div>

</body>

</html>
